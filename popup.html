<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 380px;
      min-height: 480px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
    }
    .container {
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .header-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
    }
    .header-icon svg {
      width: 28px;
      height: 28px;
      fill: white;
    }
    .header-text h1 {
      font-size: 18px;
      font-weight: 600;
    }
    .header-text .subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      margin-top: 2px;
    }
    .status-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px;
      margin: 16px 0;
      text-align: center;
    }
    .status-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 12px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .status-icon.secure {
      background: linear-gradient(135deg, #00c853 0%, #00e676 100%);
      box-shadow: 0 4px 20px rgba(0, 200, 83, 0.4);
    }
    .status-icon.insecure {
      background: linear-gradient(135deg, #ff5252 0%, #ff1744 100%);
      box-shadow: 0 4px 20px rgba(255, 82, 82, 0.4);
    }
    .status-icon svg {
      width: 32px;
      height: 32px;
      fill: white;
    }
    .status-text {
      font-size: 16px;
      font-weight: 600;
    }
    .status-text.secure {
      color: #00e676;
    }
    .status-text.insecure {
      color: #ff5252;
    }
    .domain {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-top: 8px;
      word-break: break-all;
    }
    .info-section {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .info-title {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .info-row:last-child {
      border-bottom: none;
    }
    .info-label {
      color: rgba(255,255,255,0.6);
      font-size: 13px;
    }
    .info-value {
      color: #fff;
      font-size: 13px;
      text-align: right;
      max-width: 60%;
      word-break: break-all;
    }
    .info-value.valid {
      color: #00e676;
    }
    .info-value.expiring {
      color: #ffc107;
    }
    .info-value.expired {
      color: #ff5252;
    }
    .loading {
      text-align: center;
      padding: 60px 20px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #00d4ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .error-state {
      text-align: center;
      padding: 40px 20px;
    }
    .error-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      background: rgba(255,82,82,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .error-icon svg {
      width: 32px;
      height: 32px;
      fill: #ff5252;
    }
    .refresh-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
    }
    .refresh-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0, 212, 255, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
      </div>
      <div class="header-text">
        <h1>SSL证书查询助手</h1>
        <div class="subtitle">快速查看网站安全证书信息</div>
      </div>
    </div>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <div>正在获取证书信息...</div>
      </div>
    </div>

    <button class="refresh-btn" id="refreshBtn">🔍 查看完整证书信息</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
